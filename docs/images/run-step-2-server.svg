<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-label="Flask dashboard server running on localhost 8080">
  <rect width="980" height="420" fill="#111827"/>
  <rect x="40" y="38" width="900" height="344" rx="8" fill="#0b1220" stroke="#334155"/>
  <rect x="40" y="38" width="900" height="44" rx="8" fill="#1f2937"/>
  <text x="64" y="67" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="18">Flask dashboard server</text>
  <text x="56" y="126" fill="#e5e7eb" font-family="Consolas, monospace" font-size="22">PS&gt; python .\app.py</text>
